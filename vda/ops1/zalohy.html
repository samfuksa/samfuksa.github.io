<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulace Typů Zálohování</title>
    
    <!-- Tailwind CSS pro stylování -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React a ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel pro JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .token-card { transition: transform 0.2s; }
        .token-card:hover { transform: translateY(-2px); }
        .tab-active { background-color: #2563eb; color: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .tab-inactive { background-color: white; color: #4b5563; border: 1px solid #e5e7eb; }
        .tab-inactive:hover { background-color: #f3f4f6; }
        
        /* Animace pro interaktivní přidávání dat */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Definice našich konkrétních souborů (jako ze života středoškoláka)
        const tokens = {
            PO: { icon: '📦', text: 'Základ', color: 'bg-blue-100 border-blue-400 text-blue-900', tooltip: 'Pondělí: Všechna tvoje dosavadní data' },
            UT: { icon: '📝', text: 'Úkol', color: 'bg-green-100 border-green-400 text-green-900', tooltip: 'Úterý: Rozepsaný projekt do školy' },
            ST: { icon: '🖼️', text: 'Obrázky', color: 'bg-yellow-100 border-yellow-400 text-yellow-900', tooltip: 'Středa: Stažené obrázky' },
            CT: { icon: '🎮', text: 'Hra', color: 'bg-purple-100 border-purple-400 text-purple-900', tooltip: 'Čtvrtek: Nainstalovaná nová hra' }
        };

        // Komponenta pro jeden "balíček dat"
        const Token = ({ id, animate = false }) => {
            const t = tokens[id];
            return (
                <div title={t.tooltip} className={`token-card flex flex-col items-center justify-center p-2 rounded-xl border-2 shadow-sm ${t.color} min-w-[4.5rem] bg-opacity-80 ${animate ? 'animate-pop' : ''}`}>
                    <span className="text-2xl mb-1">{t.icon}</span>
                    <span className="text-[10px] font-bold uppercase tracking-wider">{t.text}</span>
                </div>
            );
        };

        // Databáze chování pro 4 typy záloh + kvízová data (statické cesty k obnově odstraněny pro dynamiku)
        const methodsData = {
            full: {
                title: 'Úplná záloha (Všechno naráz)',
                subtitle: 'Každý den se zkopíruje úplně celý disk. Je to nejpomalejší, ale při obnove nemusíš nic řešit.',
                days: [
                    { day: 'Pondělí', desc: 'První záloha', content: ['PO'], info: 'Zkopíruje se tvůj základ.' },
                    { day: 'Úterý', desc: 'Úkol do školy', content: ['PO', 'UT'], info: 'Kopíruje se základ + úkol.' },
                    { day: 'Středa', desc: 'Nové obrázky', content: ['PO', 'UT', 'ST'], info: 'Znovu se kopíruje úplně všechno.' },
                    { day: 'Čtvrtek', desc: 'Nová hra', content: ['PO', 'UT', 'ST', 'CT'], info: 'Obrovský balík, trvá to velmi dlouho.' }
                ],
                availableBackups: [
                    { id: 'PO-F', label: 'Pondělí (Plná)', content: ['PO'] },
                    { id: 'UT-F', label: 'Úterý (Plná)', content: ['PO', 'UT'] },
                    { id: 'ST-F', label: 'Středa (Plná)', content: ['PO', 'UT', 'ST'] },
                    { id: 'CT-F', label: 'Čtvrtek (Plná)', content: ['PO', 'UT', 'ST', 'CT'] }
                ]
            },
            incremental: {
                title: 'Přírůstková (Pouze včerejšek)',
                subtitle: 'Zálohuje se VŽDY JEN TO, co jsi přidal dnes. Bleskově rychlé zálohování, ale obnova je jako skládání puzzle.',
                days: [
                    { day: 'Pondělí', desc: 'První záloha', content: ['PO'], info: 'Pondělí musí být vždy úplný základ.' },
                    { day: 'Úterý', desc: 'Úkol do školy', content: ['UT'], info: 'Zálohuje se JEN nový úkol.' },
                    { day: 'Středa', desc: 'Nové obrázky', content: ['ST'], info: 'Zálohuje se JEN stažená fotka.' },
                    { day: 'Čtvrtek', desc: 'Nová hra', content: ['CT'], info: 'Zálohuje se JEN nová hra.' }
                ],
                availableBackups: [
                    { id: 'PO-F', label: 'Pondělí (Základní Plná)', content: ['PO'] },
                    { id: 'UT-I', label: 'Úterý (Přírůstek)', content: ['UT'] },
                    { id: 'ST-I', label: 'Středa (Přírůstek)', content: ['ST'] },
                    { id: 'CT-I', label: 'Čtvrtek (Přírůstek)', content: ['CT'] }
                ]
            },
            differential: {
                title: 'Rozdílová (Vše od pondělí)',
                subtitle: 'Kopíruje vždy to, co je nové od PONDĚLÍ. Je to zlatá střední cesta mezi rychlostí a jednoduchostí.',
                days: [
                    { day: 'Pondělí', desc: 'První záloha', content: ['PO'], info: 'Základní balík (Kotva).' },
                    { day: 'Úterý', desc: 'Úkol do školy', content: ['UT'], info: 'Co je nového od pondělí? Jen úkol.' },
                    { day: 'Středa', desc: 'Nové obrázky', content: ['UT', 'ST'], info: 'Co je nového od pondělí? Úkol + obrázky.' },
                    { day: 'Čtvrtek', desc: 'Nová hra', content: ['UT', 'ST', 'CT'], info: 'Co je nového od pondělí? Úkol + obrázky + hra.' }
                ],
                availableBackups: [
                    { id: 'PO-F', label: 'Pondělí (Základní Plná)', content: ['PO'] },
                    { id: 'UT-D', label: 'Úterý (Rozdíl)', content: ['UT'] },
                    { id: 'ST-D', label: 'Středa (Rozdíl)', content: ['UT', 'ST'] },
                    { id: 'CT-D', label: 'Čtvrtek (Rozdíl)', content: ['UT', 'ST', 'CT'] }
                ]
            }
        };

        // Slovník s gramatikou dnů pro generování zadání
        const dayGrammar = [
            { nom: 'Pondělí', loc: 'pondělí', crash: 'úterý' },
            { nom: 'Úterý', loc: 'úterý', crash: 'středa' },
            { nom: 'Středa', loc: 'středu', crash: 'čtvrtek' },
            { nom: 'Čtvrtek', loc: 'čtvrtek', crash: 'pátek' }
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('differential');
            
            // Stavy pro interaktivní kvíz
            const [targetDayIndex, setTargetDayIndex] = useState(3); // 1 = Út, 2 = St, 3 = Čt
            const [selectedBackups, setSelectedBackups] = useState([]);
            const [quizStatus, setQuizStatus] = useState('idle'); // 'idle', 'correct', 'wrong'

            const data = methodsData[activeTab];

            // Vytvoření nové situace (náhodný den)
            const generateNewScenario = () => {
                let newTarget;
                do {
                    newTarget = Math.floor(Math.random() * 3) + 1; // Generuje index 1, 2 nebo 3 (Úterý až Čtvrtek)
                } while (newTarget === targetDayIndex);
                
                setTargetDayIndex(newTarget);
                setSelectedBackups([]);
                setQuizStatus('idle');
            };

            // Resetování kvízu při změně typu zálohování
            useEffect(() => {
                setSelectedBackups([]);
                setQuizStatus('idle');
            }, [activeTab, targetDayIndex]);

            // Přidání zálohy do fronty
            const handleSelectBackup = (backup) => {
                if (quizStatus === 'correct') return; // Po úspěchu už neklikáme
                setSelectedBackups([...selectedBackups, backup]);
                setQuizStatus('idle'); // Skryje předchozí chybovou hlášku
            };

            // Odebrání zálohy z fronty
            const handleRemoveBackup = (index) => {
                if (quizStatus === 'correct') return;
                const newSelection = [...selectedBackups];
                newSelection.splice(index, 1);
                setSelectedBackups(newSelection);
                setQuizStatus('idle');
            };

            // Vyhodnocení odpovědi na základě dynamického cílového dne
            const checkAnswer = () => {
                if (selectedBackups.length === 0) {
                    setQuizStatus('wrong');
                    return;
                }
                
                // Dynamický výpočet správné cesty
                const getCorrectPath = () => {
                    const daysMap = ['PO', 'UT', 'ST', 'CT'];
                    const targetCode = daysMap[targetDayIndex];
                    
                    if (activeTab === 'full') return [`${targetCode}-F`];
                    if (activeTab === 'incremental') {
                        const path = ['PO-F'];
                        for(let i = 1; i <= targetDayIndex; i++) path.push(`${daysMap[i]}-I`);
                        return path;
                    }
                    if (activeTab === 'differential') return ['PO-F', `${targetCode}-D`];
                    return [];
                };

                const selectedIds = selectedBackups.map(b => b.id);
                const isCorrect = JSON.stringify(selectedIds) === JSON.stringify(getCorrectPath());
                
                setQuizStatus(isCorrect ? 'correct' : 'wrong');
            };

            // Dynamická chybová hláška
            const getFeedback = () => {
                const dName = dayGrammar[targetDayIndex].nom;
                if (activeTab === 'full') return `❌ Chyba! U úplné zálohy nepotřebuješ staré dny. Stačí vybrat jen ten úplně nejnovější balík ze dne ${dName}, má v sobě už zkopírované úplně všechno.`;
                if (activeTab === 'incremental') return `❌ Chyba! U přírůstkové zálohy musíš naklikat úplně VŠECHNY dny přesně popořadě. Musíš začít pondělním základem a pak postupně přidávat dny až do dne ${dName}.`;
                if (activeTab === 'differential') return `❌ Chyba! U rozdílové zálohy nepotřebuješ mezistupně. Potřebuješ nahrát jen pondělní základ a přes něj plácnout ten poslední rozdíl ze dne ${dName}!`;
                return 'Chyba ve výběru!';
            };

            // Omezení dostupných záloh pouze na dny PŘED havárií
            const currentAvailableBackups = data.availableBackups.slice(0, targetDayIndex + 1);

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-5xl mx-auto flex flex-col gap-6">
                    
                    {/* Hlavička */}
                    <div className="text-center space-y-3">
                        <h1 className="text-4xl font-extrabold text-slate-800">Zálohování: Jak nepřijít o data 💾</h1>
                        <p className="text-lg text-slate-600 max-w-2xl mx-auto">Vyberte si typ zálohování a podívejte se, jak funguje v běžném životě středoškoláka.</p>
                    </div>

                    {/* Navigace - Taby */}
                    <div className="flex flex-wrap justify-center gap-3">
                        {Object.entries(methodsData).map(([key, info]) => (
                            <button
                                key={key}
                                onClick={() => setActiveTab(key)}
                                className={`px-6 py-3 rounded-xl font-bold text-lg transition-all ${activeTab === key ? 'tab-active' : 'tab-inactive'}`}
                            >
                                {info.title.split(' ')[0]} {/* Zkrácený název */}
                            </button>
                        ))}
                    </div>

                    {/* Hlavní obsah pro vybranou metodu */}
                    <div className="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                        
                        {/* Vysvětlení metody */}
                        <div className="bg-blue-50 border-b border-blue-100 p-6">
                            <h2 className="text-2xl font-bold text-blue-900 mb-2">{data.title}</h2>
                            <p className="text-blue-800 text-lg">{data.subtitle}</p>
                        </div>

                        <div className="p-6 md:p-8 grid grid-cols-1 lg:grid-cols-2 gap-12">
                            
                            {/* Sekce 1: Tvorba zálohy */}
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                                    <span>📥</span> Co se v ten den reálně zkopíruje:
                                </h3>
                                
                                <div className="space-y-4">
                                    {data.days.map((dayData, i) => (
                                        <div key={i} className="flex gap-4 p-4 rounded-xl border border-slate-100 bg-slate-50 relative group">
                                            {/* Den štítek */}
                                            <div className="w-24 pt-2 shrink-0">
                                                <div className="font-bold text-slate-700">{dayData.day}</div>
                                                <div className="text-xs text-slate-500 leading-tight mt-1">{dayData.desc}</div>
                                            </div>
                                            
                                            {/* Obsah zálohy */}
                                            <div className="flex-1">
                                                <div className="flex flex-wrap gap-2 mb-2">
                                                    {dayData.content.map((id, idx) => <Token key={idx} id={id} />)}
                                                </div>
                                                <div className="text-sm text-slate-600 italic bg-white p-2 rounded border border-slate-200 shadow-sm">
                                                    {dayData.info}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Sekce 2: INTERAKTIVNÍ Kvíz obnovy */}
                            <div className="flex flex-col">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-bold text-red-600 flex items-center gap-2">
                                        <span>🎮</span> Výzva: Oprav mrtvý disk!
                                    </h3>
                                    <button 
                                        onClick={generateNewScenario} 
                                        className="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-3 py-1.5 rounded-full text-sm font-bold transition flex items-center gap-1 shadow-sm"
                                        title="Změní den, ve který došlo k havárii"
                                    >
                                        🔄 Změnit den havárie
                                    </button>
                                </div>
                                
                                <div className={`flex-1 p-6 rounded-2xl border flex flex-col justify-between transition-colors ${quizStatus === 'correct' ? 'bg-green-50 border-green-300' : quizStatus === 'wrong' ? 'bg-red-50 border-red-300' : 'bg-slate-50 border-blue-200'}`}>
                                    <div>
                                        <h4 className="font-bold text-slate-800 mb-2 text-lg">
                                            Situace: Je {dayGrammar[targetDayIndex].crash} ráno a disk ti vyhořel.
                                        </h4>
                                        <p className="text-slate-600 text-sm mb-6">
                                            Tvým úkolem je zachránit data přesně tak, jak byla v/ve <strong>{dayGrammar[targetDayIndex].loc} večer</strong>. 
                                            Naklikej z externího disku ty správné soubory do obnovovací fronty ve správném pořadí!
                                        </p>
                                    </div>
                                    
                                    {/* Sklad záloh */}
                                    <div className="mb-6">
                                        <h5 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Sklad záloh (Co máš k dispozici):</h5>
                                        <div className="grid grid-cols-2 gap-2">
                                            {currentAvailableBackups.map(backup => (
                                                <button
                                                    key={backup.id}
                                                    onClick={() => handleSelectBackup(backup)}
                                                    disabled={quizStatus === 'correct'}
                                                    className={`text-left border rounded-xl p-3 transition flex flex-col gap-2 ${quizStatus === 'correct' ? 'bg-slate-100 border-slate-200 opacity-50 cursor-not-allowed' : 'bg-white border-slate-300 hover:border-blue-500 hover:shadow-md active:bg-blue-50'}`}
                                                >
                                                    <div className="font-bold text-xs text-slate-700">{backup.label}</div>
                                                    <div className="flex flex-wrap gap-1">
                                                        {backup.content.map((id, idx) => (
                                                            <span key={idx} className="text-lg bg-slate-100 rounded p-1" title={tokens[id].text}>{tokens[id].icon}</span>
                                                        ))}
                                                    </div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Obnovovací fronta */}
                                    <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-inner flex flex-col gap-4">
                                        <div className="flex justify-between items-center border-b pb-2">
                                            <h5 className="text-xs font-bold text-slate-500 uppercase tracking-wider">Tvoje fronta k nahrání:</h5>
                                            <button onClick={() => setSelectedBackups([])} className="text-xs text-red-500 hover:underline font-bold" disabled={quizStatus === 'correct'}>Vymazat frontu</button>
                                        </div>

                                        <div className="flex flex-wrap gap-2 min-h-[60px] items-center">
                                            {selectedBackups.length === 0 && (
                                                <span className="text-slate-400 italic text-sm">Zatím jsi nic nevybral. Klikej na zálohy výše.</span>
                                            )}
                                            {selectedBackups.map((backup, idx) => (
                                                <div key={`${backup.id}-${idx}`} className="flex items-center gap-2 animate-pop">
                                                    <button 
                                                        onClick={() => handleRemoveBackup(idx)}
                                                        disabled={quizStatus === 'correct'}
                                                        className="bg-blue-50 border-2 border-blue-400 rounded-lg p-2 hover:bg-red-50 hover:border-red-400 transition group relative"
                                                        title="Kliknutím odebereš"
                                                    >
                                                        {quizStatus !== 'correct' && (
                                                            <span className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition shadow-sm">×</span>
                                                        )}
                                                        <div className="font-bold text-[10px] text-blue-900 mb-1">{backup.label}</div>
                                                        <div className="flex gap-1">
                                                            {backup.content.map((id, i) => <span key={i} className="text-sm">{tokens[id].icon}</span>)}
                                                        </div>
                                                    </button>
                                                    {idx < selectedBackups.length - 1 && (
                                                        <span className="text-slate-400 font-bold text-xl">➔</span>
                                                    )}
                                                </div>
                                            ))}
                                        </div>

                                        {/* Vyhodnocení */}
                                        <div className="mt-2">
                                            {quizStatus === 'idle' && (
                                                <button 
                                                    onClick={checkAnswer}
                                                    className="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-md hover:bg-blue-700 transition transform hover:-translate-y-0.5"
                                                >
                                                    Spustit obnovu dat
                                                </button>
                                            )}
                                            {quizStatus === 'correct' && (
                                                <div className="w-full bg-green-100 border border-green-500 text-green-800 font-bold py-3 px-4 rounded-xl text-center animate-pop">
                                                    ✅ Výborně! Přesně takhle se {data.title.split(' ')[0].toLowerCase()} záloha obnovuje. Data jsou zachráněna!
                                                </div>
                                            )}
                                            {quizStatus === 'wrong' && (
                                                <div className="w-full bg-red-100 border border-red-500 text-red-800 font-medium py-3 px-4 rounded-xl text-sm animate-pop flex gap-3 items-center">
                                                    <span className="text-2xl">🚨</span>
                                                    <span>{getFeedback()}</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    {/* Závěrečná srovnávací tabulka pro rychlé shrnutí */}
                    <div className="bg-slate-800 text-white rounded-2xl p-6 shadow-lg">
                        <h3 className="text-xl font-bold mb-4 text-slate-200">Základní taháky do školy:</h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div className="bg-slate-700 p-4 rounded-xl border-l-4 border-blue-400">
                                <div className="font-bold text-blue-300 mb-2 text-lg">Úplná</div>
                                <ul className="text-sm space-y-2 text-slate-300">
                                    <li>⏱️ Tvoří se velmi dlouho</li>
                                    <li>💾 Žere nejvíc místa na disku</li>
                                    <li>⚡ Extrémně jednoduchá obnova</li>
                                </ul>
                            </div>
                            <div className="bg-slate-700 p-4 rounded-xl border-l-4 border-green-400">
                                <div className="font-bold text-green-300 mb-2 text-lg">Přírůstková</div>
                                <ul className="text-sm space-y-2 text-slate-300">
                                    <li>⚡ Tvoří se super rychle</li>
                                    <li>💾 Šetří nejvíc místa</li>
                                    <li>⏱️ Obnova je zdlouhavé skládání dílů</li>
                                </ul>
                            </div>
                            <div className="bg-slate-700 p-4 rounded-xl border-l-4 border-yellow-400">
                                <div className="font-bold text-yellow-300 mb-2 text-lg">Rozdílová</div>
                                <ul className="text-sm space-y-2 text-slate-300">
                                    <li>⚖️ Ideální kompromis</li>
                                    <li>💾 Místa zabere "tak nějak středně"</li>
                                    <li>⚡ Obnova je celkem rychlá</li>
                                </ul>
                            </div>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
