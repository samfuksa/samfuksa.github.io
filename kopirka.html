<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generátor starých kopií (Školní kopírka)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js pro načítání PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- jsPDF pro generování nového PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .canvas-container {
            background-image: repeating-linear-gradient(45deg, #e5e7eb 25%, transparent 25%, transparent 75%, #e5e7eb 75%, #e5e7eb), repeating-linear-gradient(45deg, #e5e7eb 25%, #f9fafb 25%, #f9fafb 75%, #e5e7eb 75%, #e5e7eb);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden flex flex-col md:flex-row">
        
        <!-- Levý panel: Ovládání -->
        <div class="w-full md:w-1/3 bg-gray-50 p-6 border-r border-gray-200">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">📠 Školní Kopírka</h1>
            <p class="text-sm text-gray-500 mb-6">Udělá z čistého PDF špatně čitelnou kopii, jaká se dřív rozdávala ve škole.</p>

            <div class="space-y-5">
                <!-- Nahrávání -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nahrajte PDF dokument</label>
                    <input type="file" id="pdf-upload" accept="application/pdf" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-colors">
                </div>

                <!-- Nastavení efektů -->
                <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm space-y-4">
                    <h3 class="font-semibold text-gray-700 border-b pb-2">Nastavení nekvality</h3>
                    
                    <div>
                        <label class="flex justify-between text-sm text-gray-600 mb-1">
                            <span>Množství toneru (Světlost)</span>
                            <span id="val-brightness">120%</span>
                        </label>
                        <input type="range" id="ctrl-brightness" min="50" max="200" value="120" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <div>
                        <label class="flex justify-between text-sm text-gray-600 mb-1">
                            <span>Vypálení (Kontrast)</span>
                            <span id="val-contrast">350%</span>
                        </label>
                        <input type="range" id="ctrl-contrast" min="100" max="1000" value="350" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <div>
                        <label class="flex justify-between text-sm text-gray-600 mb-1">
                            <span>Rozpíjení (Rozmazání)</span>
                            <span id="val-blur">1.2px</span>
                        </label>
                        <input type="range" id="ctrl-blur" min="0" max="10" step="0.1" value="1.2" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <div>
                        <label class="flex justify-between text-sm text-gray-600 mb-1">
                            <span>Špína a zrnitost</span>
                            <span id="val-noise">15%</span>
                        </label>
                        <input type="range" id="ctrl-noise" min="0" max="100" value="15" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                    </div>
                    
                    <div>
                        <label class="flex justify-between text-sm text-gray-600 mb-1 font-semibold text-red-600">
                            <span>Rozpad detailů (Zničení čitelnosti)</span>
                            <span id="val-decay">Úroveň 4</span>
                        </label>
                        <input type="range" id="ctrl-decay" min="1" max="15" value="4" class="w-full h-2 bg-red-200 rounded-lg appearance-none cursor-pointer accent-red-600">
                    </div>

                    <div class="flex items-center pt-2">
                        <input type="checkbox" id="ctrl-grayscale" checked class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
                        <label for="ctrl-grayscale" class="ml-2 text-sm font-medium text-gray-700">Černobílá kopie</label>
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" id="ctrl-lines" checked class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
                        <label for="ctrl-lines" class="ml-2 text-sm font-medium text-gray-700">Pruhy od válce kopírky</label>
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" id="ctrl-smear" checked class="w-4 h-4 text-red-600 bg-gray-100 border-gray-300 rounded focus:ring-red-500">
                        <label for="ctrl-smear" class="ml-2 text-sm font-medium text-red-700">Rozmazat text do strany (Smear)</label>
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" id="ctrl-crooked" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
                        <label for="ctrl-crooked" class="ml-2 text-sm font-medium text-gray-700">Křivě vložený papír</label>
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" id="ctrl-edges" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
                        <label for="ctrl-edges" class="ml-2 text-sm font-medium text-gray-700">Černé okraje (špatný sken)</label>
                    </div>
                </div>

                <!-- Akce -->
                <div class="pt-4 space-y-3">
                    <button id="btn-process" disabled class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-md flex justify-center items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Stáhnout jako PDF
                    </button>
                    
                    <div id="status-box" class="hidden text-center text-sm font-medium text-blue-600 bg-blue-50 p-3 rounded-lg border border-blue-100">
                        <!-- Zde se zobrazí průběh -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Pravý panel: Náhled -->
        <div class="w-full md:w-2/3 p-6 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-gray-800">Náhled první strany</h2>
                <div class="text-sm text-gray-500">Výsledek může být na každé stránce mírně odlišný (náhodný šum).</div>
            </div>
            
            <div class="canvas-container flex-1 border-2 border-dashed border-gray-300 rounded-xl flex items-center justify-center overflow-auto relative p-4" id="preview-container">
                <div id="placeholder-text" class="text-gray-400 text-center">
                    <svg class="mx-auto h-12 w-12 text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Nahrajte PDF pro zobrazení náhledu
                </div>
                <!-- Zde se vykreslí plátno (canvas) -->
                <canvas id="preview-canvas" class="hidden shadow-2xl max-w-full h-auto" style="max-height: 700px;"></canvas>
            </div>
        </div>
    </div>

    <!-- Skrytá plátna pro zpracování plného rozlišení -->
    <canvas id="render-canvas" class="hidden"></canvas>
    <canvas id="fx-canvas" class="hidden"></canvas>

    <script>
        // Inicializace PDF.js workeru
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Globální proměnné
        let currentPdf = null;
        let originalPageData = null; // Uchování původní vyrenderované první stránky pro rychlý náhled
        let renderScale = 2.0; // Rozlišení renderování (vyšší = lepší čitelnost původního textu před aplikací filtru)

        // UI Elementy
        const uploadInput = document.getElementById('pdf-upload');
        const btnProcess = document.getElementById('btn-process');
        const previewCanvas = document.getElementById('preview-canvas');
        const placeholderText = document.getElementById('placeholder-text');
        const statusBox = document.getElementById('status-box');
        
        // Ovládací prvky a zobrazení hodnot
        const controls = {
            brightness: document.getElementById('ctrl-brightness'),
            contrast: document.getElementById('ctrl-contrast'),
            blur: document.getElementById('ctrl-blur'),
            noise: document.getElementById('ctrl-noise'),
            decay: document.getElementById('ctrl-decay'),
            grayscale: document.getElementById('ctrl-grayscale'),
            lines: document.getElementById('ctrl-lines'),
            smear: document.getElementById('ctrl-smear'),
            crooked: document.getElementById('ctrl-crooked'),
            edges: document.getElementById('ctrl-edges')
        };
        const displays = {
            brightness: document.getElementById('val-brightness'),
            contrast: document.getElementById('val-contrast'),
            blur: document.getElementById('val-blur'),
            noise: document.getElementById('val-noise'),
            decay: document.getElementById('val-decay')
        };

        // --- Event Listenery ---

        uploadInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file || file.type !== 'application/pdf') {
                showMessage('Prosím, nahrajte platný PDF soubor.', true);
                return;
            }

            try {
                showMessage('Načítám PDF...', false);
                const arrayBuffer = await file.arrayBuffer();
                currentPdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                
                btnProcess.disabled = false;
                placeholderText.classList.add('hidden');
                previewCanvas.classList.remove('hidden');
                
                await renderFirstPageForPreview();
                hideMessage();
            } catch (error) {
                console.error(error);
                showMessage('Chyba při načítání PDF.', true);
            }
        });

        // Aktualizace náhledu při změně posuvníků
        Object.keys(controls).forEach(key => {
            const eventName = controls[key].type === 'checkbox' ? 'change' : 'input';
            controls[key].addEventListener(eventName, () => {
                // Aktualizace textových hodnot
                if (displays[key]) {
                    if (key === 'blur') displays[key].textContent = `${controls[key].value}px`;
                    else if (key === 'decay') displays[key].textContent = `Úroveň ${controls[key].value}`;
                    else displays[key].textContent = `${controls[key].value}%`;
                }
                // Překreslení náhledu s malým zpožděním (debounce), aby se nesekal prohlížeč
                clearTimeout(window.previewTimeout);
                window.previewTimeout = setTimeout(() => {
                    if (currentPdf) updatePreview();
                }, 100);
            });
        });

        btnProcess.addEventListener('click', generatePdf);

        // --- Logika zpracování ---

        // Vykreslí první stránku do paměti a zavolá update náhledu
        async function renderFirstPageForPreview() {
            const page = await currentPdf.getPage(1);
            const viewport = page.getViewport({ scale: renderScale });
            
            const canvas = document.getElementById('render-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = viewport.width;
            canvas.height = viewport.height;

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            
            // Uložení obrazových dat pro rychlé znovupoužití filtru
            originalPageData = canvas;
            updatePreview();
        }

        // Aplikuje aktuální efekty na uloženou první stránku a zobrazí ji v náhledu
        function updatePreview() {
            if (!originalPageData) return;

            const targetCanvas = previewCanvas;
            targetCanvas.width = originalPageData.width;
            targetCanvas.height = originalPageData.height;
            
            applyPhotocopyEffect(originalPageData, targetCanvas);
        }

        // Hlavní funkce pro generování "špinavé kopie" (aplikace filtrů)
        function applyPhotocopyEffect(sourceCanvas, targetCanvas) {
            const ctx = targetCanvas.getContext('2d', { willReadFrequently: true });
            const width = targetCanvas.width;
            const height = targetCanvas.height;

            // Získání hodnot z UI
            const brightness = controls.brightness.value;
            const contrast = controls.contrast.value;
            const blur = controls.blur.value;
            const noisePercent = controls.noise.value;
            const drawLines = controls.lines.checked;
            const isCrooked = controls.crooked.checked;
            const hasEdges = controls.edges.checked;
            const decay = parseInt(controls.decay.value);
            const doSmear = controls.smear.checked;
            const isGrayscale = controls.grayscale.checked;

            // Bílý podklad (nutné, pokud budeme obraz rotovat, aby nevzniklo průhledné pozadí)
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            
            // Křivé vložení papíru (mírná rotace a posun)
            if (isCrooked) {
                const angle = (Math.random() - 0.5) * 0.05; // rotace v radiánech
                const offsetX = (Math.random() - 0.5) * 40;
                const offsetY = (Math.random() - 0.5) * 40;
                ctx.translate(width/2 + offsetX, height/2 + offsetY);
                ctx.rotate(angle);
                ctx.translate(-width/2, -height/2);
            }

            // ZTRÁTA ROZLIŠENÍ (Downsampling trick pro zničení čitelnosti)
            // Čím vyšší úroveň rozpadu, tím menší plátno se použije jako mezikrok
            const scaleFactor = 1 / (1 + (decay - 1) * 0.25); 
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = width * scaleFactor;
            tempCanvas.height = height * scaleFactor;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.drawImage(sourceCanvas, 0, 0, tempCanvas.width, tempCanvas.height);

            // 1. KROK: Aplikace základních CSS filtrů na plátno (rychlé)
            ctx.filter = `blur(${blur}px) contrast(${contrast}%) brightness(${brightness}%)`;
            // Vypne vyhlazování (anti-aliasing) pro těžce degradovaný "hrudkovitý" text
            ctx.imageSmoothingEnabled = (decay < 5); 
            ctx.drawImage(tempCanvas, 0, 0, width, height);
            ctx.filter = 'none'; // reset filtru
            ctx.restore();

            // Horizontální rozmazání (Smear) - simulace prokluzujícího válce
            if (doSmear) {
                ctx.save();
                ctx.globalCompositeOperation = 'multiply'; // Tmavé plochy se sečtou
                ctx.globalAlpha = 0.5;
                ctx.drawImage(targetCanvas, 3 + Math.random()*2, 0); // Posun o kousek
                ctx.globalAlpha = 0.2;
                ctx.drawImage(targetCanvas, 7 + Math.random()*4, 0); // Posun ještě dál
                ctx.restore();
            }

            // Přidání špinavých okrajů (např. nedovřené víko kopírky)
            if (hasEdges) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                // Náhodné masivní černé bloky u okrajů
                if (Math.random() > 0.4) ctx.fillRect(0, 0, Math.random() * 60 + 10, height); // levý
                if (Math.random() > 0.6) ctx.fillRect(0, 0, width, Math.random() * 50 + 10); // horní
                if (Math.random() > 0.6) ctx.fillRect(width - (Math.random() * 50 + 10), 0, 60, height); // pravý
                if (Math.random() > 0.8) ctx.fillRect(0, height - (Math.random() * 40 + 10), width, 50); // dolní
                
                // Jemnější tmavý stín přes levý okraj (častý u vazeb knih)
                const grad = ctx.createLinearGradient(0, 0, 150, 0);
                grad.addColorStop(0, 'rgba(0,0,0,0.6)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 150, height);
            }

            // 2. KROK: Manipulace na úrovni pixelů pro zrnitost a špínu
            if (noisePercent > 0 || drawLines || isGrayscale) {
                const imageData = ctx.getImageData(0, 0, width, height);
                const data = imageData.data;
                const noiseIntensity = parseInt(noisePercent);

                // Svislé pruhy od válce kopírky (náhodně generované, nyní agresivnější)
                const scratchLines = [];
                if (drawLines) {
                    const numLines = Math.floor(Math.random() * 8) + 3; // Více pruhů
                    for (let i = 0; i < numLines; i++) {
                        scratchLines.push({
                            x: Math.floor(Math.random() * width),
                            width: Math.floor(Math.random() * 8) + 1, // Tlustší pruhy
                            opacity: Math.random() * 0.3 + 0.05 // Tmavší pruhy
                        });
                    }
                }

                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const i = (y * width + x) * 4;
                        
                        // 100% spolehlivý černobílý filtr přímo na pixelech
                        if (isGrayscale) {
                            const luma = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                            data[i] = luma;
                            data[i+1] = luma;
                            data[i+2] = luma;
                        }

                        // Záměrná náhodná zrnitost (agresivnější)
                        if (noiseIntensity > 0 && Math.random() * 100 < noiseIntensity) {
                            if (Math.random() > 0.2) {
                                // Špína z toneru (tmavé tečky)
                                const noiseVal = Math.random() * 200;
                                data[i] = Math.max(0, data[i] - noiseVal);
                                data[i+1] = Math.max(0, data[i+1] - noiseVal);
                                data[i+2] = Math.max(0, data[i+2] - noiseVal);
                            } else {
                                // Chybějící toner (bílé "vypálené" tečky)
                                const noiseVal = Math.random() * 200;
                                data[i] = Math.min(255, data[i] + noiseVal);
                                data[i+1] = Math.min(255, data[i+1] + noiseVal);
                                data[i+2] = Math.min(255, data[i+2] + noiseVal);
                            }
                        }

                        // Vykreslení pruhů
                        if (drawLines) {
                            for (const line of scratchLines) {
                                if (x >= line.x && x < line.x + line.width) {
                                    // Ztmavení pixelu pro simulaci špíny na válci
                                    data[i] = Math.max(0, data[i] - (255 * line.opacity));
                                    data[i+1] = Math.max(0, data[i+1] - (255 * line.opacity));
                                    data[i+2] = Math.max(0, data[i+2] - (255 * line.opacity));
                                }
                            }
                        }
                    }
                }
                ctx.putImageData(imageData, 0, 0);
            }
        }

        // Generování celého výsledného PDF
        async function generatePdf() {
            if (!currentPdf) return;

            btnProcess.disabled = true;
            controlsDisabled(true);
            
            const { jsPDF } = window.jspdf;
            const pdfOut = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a4'
            });

            const renderCanvas = document.getElementById('render-canvas');
            const fxCanvas = document.getElementById('fx-canvas');
            const numPages = currentPdf.numPages;

            for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                showMessage(`Zpracovávám stranu ${pageNum} z ${numPages}...`, false);
                
                // Přenechání vlákna prohlížeči pro překreslení UI (aby nezamrzl)
                await new Promise(r => setTimeout(r, 50)); 

                const page = await currentPdf.getPage(pageNum);
                
                // Výpočet správné velikosti stránky A4 (210x297mm) pro jsPDF
                // Vnitřní rozlišení necháme vyšší přes renderScale pro lepší výstupní kvalitu
                const viewport = page.getViewport({ scale: renderScale });
                renderCanvas.width = viewport.width;
                renderCanvas.height = viewport.height;
                fxCanvas.width = viewport.width;
                fxCanvas.height = viewport.height;

                const renderCtx = renderCanvas.getContext('2d');
                await page.render({ canvasContext: renderCtx, viewport: viewport }).promise;

                // Aplikace efektů
                applyPhotocopyEffect(renderCanvas, fxCanvas);

                // Přidání do nového PDF
                const imgData = fxCanvas.toDataURL('image/jpeg', 0.85); // JPEG komprese pro rozumnou velikost souboru
                
                // Určení velikosti strany v mm pro jsPDF
                const a4Width = 210;
                const a4Height = 297;
                // Pokud je stránka na šířku
                const isLandscape = viewport.width > viewport.height;
                
                if (pageNum > 1) {
                    pdfOut.addPage(isLandscape ? 'a4' : 'a4', isLandscape ? 'landscape' : 'portrait');
                }
                
                const format = isLandscape ? [a4Height, a4Width] : [a4Width, a4Height]; // [šířka, výška] pro addImage
                pdfOut.addImage(imgData, 'JPEG', 0, 0, format[0], format[1]);
            }

            showMessage('Ukládám PDF...', false);
            pdfOut.save('spatna_kopie.pdf');
            
            showMessage('Hotovo! Soubor se stahuje.', false);
            setTimeout(hideMessage, 3000);
            
            btnProcess.disabled = false;
            controlsDisabled(false);
        }

        // --- Pomocné funkce ---

        function showMessage(text, isError) {
            statusBox.textContent = text;
            statusBox.classList.remove('hidden');
            if (isError) {
                statusBox.classList.replace('bg-blue-50', 'bg-red-50');
                statusBox.classList.replace('text-blue-600', 'text-red-600');
                statusBox.classList.replace('border-blue-100', 'border-red-100');
            } else {
                statusBox.classList.replace('bg-red-50', 'bg-blue-50');
                statusBox.classList.replace('text-red-600', 'text-blue-600');
                statusBox.classList.replace('border-red-100', 'border-blue-100');
            }
        }

        function hideMessage() {
            statusBox.classList.add('hidden');
        }

        function controlsDisabled(disabled) {
            Object.values(controls).forEach(ctrl => ctrl.disabled = disabled);
            uploadInput.disabled = disabled;
        }

    </script>
</body>
</html>
