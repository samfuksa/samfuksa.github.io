<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistika železničních dopravců</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Definice vagónů pomocí inline SVG jako repeating background pro plynulé škálování */
        
        /* České Dráhy (ČD) - Modrá barva, světle modrý pruh */
        .wagon-cd {
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='48' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='116' height='48' fill='%2300508F' rx='3'/%3E%3Crect y='22' width='116' height='8' fill='%2300A0D1'/%3E%3Crect x='15' y='14' width='30' height='18' rx='3' fill='%23111827'/%3E%3Crect x='70' y='14' width='30' height='18' rx='3' fill='%23111827'/%3E%3Crect x='116' y='24' width='4' height='4' fill='%23374151'/%3E%3C/svg%3E");
            background-position: right top;
        }

        /* RegioJet (RJ) - Žlutá barva, tmavý pruh v oblasti oken */
        .wagon-rj {
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='48' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='116' height='48' fill='%23F9E013' rx='3'/%3E%3Crect y='12' width='116' height='24' fill='%232d3748'/%3E%3Crect x='15' y='15' width='30' height='18' rx='3' fill='%23111827'/%3E%3Crect x='70' y='15' width='30' height='18' rx='3' fill='%23111827'/%3E%3Crect x='116' y='24' width='4' height='4' fill='%23374151'/%3E%3C/svg%3E");
            background-position: right top;
        }

        /* Leo Express (LE) - Černá barva, zlatý pruh */
        .wagon-le {
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='48' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='116' height='48' fill='%231A1A1A' rx='3'/%3E%3Crect y='36' width='116' height='4' fill='%23E5A900'/%3E%3Crect x='15' y='14' width='30' height='18' rx='3' fill='%23374151'/%3E%3Crect x='70' y='14' width='30' height='18' rx='3' fill='%23374151'/%3E%3Crect x='116' y='24' width='4' height='4' fill='%23374151'/%3E%3C/svg%3E");
            background-position: right top;
        }

        /* Vzhled kol vlaku */
        .wheels-layer {
            background-image: radial-gradient(circle at 12px 4px, #1f2937 4px, #9ca3af 5px, transparent 6px);
            background-size: 30px 10px;
            background-position: right bottom;
        }

        /* Vzhled kolejí (pražce) */
        .sleepers {
            background-image: repeating-linear-gradient(90deg, #4a5568 0, #4a5568 4px, transparent 4px, transparent 18px);
        }

        /* Plynulá a lehce pružná animace změny šířky vlaku */
        .train-animate {
            transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 font-sans flex items-center justify-center">

    <div class="max-w-5xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Hlavička -->
        <div class="bg-gray-800 text-white p-6">
            <h1 class="text-2xl font-bold flex items-center gap-3">
                <span class="text-3xl">🚄</span> Generátor vlakového grafu
            </h1>
            <p class="text-gray-300 mt-2 text-sm">Zadej přepravené cestující (nebo tržby) jednotlivých dopravců a porovnej jejich podíly.</p>
        </div>

        <div class="p-6 md:p-8">
            <!-- Vstupní formulář -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 bg-gray-50 p-6 rounded-xl border border-gray-200">
                <!-- Vstup: Nadpis grafu -->
                <div class="md:col-span-3 mb-2">
                    <label class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">Nadpis grafu</label>
                    <input type="text" id="input-title" value="Podíl dopravců na trhu" placeholder="Zadej nadpis grafu..."
                           class="w-full border-2 border-gray-300 rounded-lg p-3 text-lg font-semibold focus:outline-none focus:ring-4 focus:ring-blue-500/30 transition-all">
                </div>

                <!-- Vstup: České Dráhy -->
                <div>
                    <label class="block text-sm font-bold text-[#00508F] mb-2 uppercase tracking-wide">České Dráhy</label>
                    <input type="number" id="input-cd" value="120" min="0" 
                           class="w-full border-2 border-[#00508F] rounded-lg p-3 text-lg font-semibold focus:outline-none focus:ring-4 focus:ring-[#00A0D1]/30 transition-all">
                </div>
                <!-- Vstup: RegioJet -->
                <div>
                    <label class="block text-sm font-bold text-[#b48600] mb-2 uppercase tracking-wide">RegioJet</label>
                    <input type="number" id="input-rj" value="65" min="0" 
                           class="w-full border-2 border-[#F9E013] rounded-lg p-3 text-lg font-semibold focus:outline-none focus:ring-4 focus:ring-[#F9E013]/40 transition-all">
                </div>
                <!-- Vstup: Leo Express -->
                <div>
                    <label class="block text-sm font-bold text-gray-800 mb-2 uppercase tracking-wide">Leo Express</label>
                    <input type="number" id="input-le" value="25" min="0" 
                           class="w-full border-2 border-gray-800 rounded-lg p-3 text-lg font-semibold focus:outline-none focus:ring-4 focus:ring-gray-400/50 transition-all">
                </div>
                
                <div class="md:col-span-3 mt-2 flex flex-col sm:flex-row gap-4">
                    <button onclick="updateGraph()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md transition-all active:scale-[0.98] text-lg">
                        Aktualizovat graf
                    </button>
                    <button onclick="exportToPNG()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-8 rounded-xl shadow-md transition-all active:scale-[0.98] text-lg flex justify-center items-center gap-2">
                        <span>📸</span> Exportovat do PNG
                    </button>
                </div>
            </div>

            <!-- Prostor pro graf -->
            <div id="export-area" class="flex flex-col gap-10 mt-10 p-6 -mx-6 bg-white rounded-xl transition-all">
                
                <!-- Nadpis grafu (zobrazí se i při exportu) -->
                <h2 id="display-title" class="text-2xl md:text-3xl font-bold text-center text-gray-800 -mb-2"></h2>

                <!-- Řádek: České Dráhy -->
                <div id="row-cd" class="relative transition-all duration-500">
                    <div class="flex justify-between items-end mb-2 px-1">
                        <div class="flex items-center gap-2">
                            <div class="w-4 h-4 rounded bg-[#00508F]"></div>
                            <span class="font-bold text-gray-800 text-lg">České Dráhy</span>
                        </div>
                        <div id="text-cd" class="text-right text-lg">0% (0)</div>
                    </div>
                    <!-- Koleje a Vlak -->
                    <div class="relative h-[64px] border-b-[3px] border-gray-400">
                        <div class="sleepers absolute bottom-[-3px] left-0 w-full h-[6px] z-0"></div>
                        
                        <!-- Samotný Vlak (Kontejner) -->
                        <div id="bar-cd" class="train-animate absolute left-0 bottom-[1px] h-[56px] z-10 overflow-hidden" style="width: 0%;">
                            <!-- Kola -->
                            <div class="absolute bottom-0 right-0 w-[2000px] h-[8px] wheels-layer"></div>
                            <!-- Vagóny -->
                            <div class="absolute left-0 top-0 h-[48px] right-[79px] bg-repeat-x wagon-cd"></div>
                            <!-- Lokomotiva (SVG zepředu) -->
                            <div class="absolute right-0 top-0 w-[80px] h-[48px]">
                                <svg width="80" height="48" viewBox="0 0 80 48" xmlns="http://www.w3.org/2000/svg">
                                    <defs><clipPath id="cd-clip"><path d="M0,0 L50,0 C70,0 80,20 80,48 L0,48 Z"/></clipPath></defs>
                                    <g clip-path="url(#cd-clip)">
                                        <rect width="80" height="48" fill="#00508F"/>
                                        <rect y="22" width="80" height="8" fill="#00A0D1"/>
                                        <rect x="45" y="8" width="28" height="14" rx="2" fill="#111827"/>
                                        <rect x="76" y="38" width="6" height="4" fill="#ffffff" opacity="0.8"/>
                                    </g>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Řádek: RegioJet -->
                <div id="row-rj" class="relative transition-all duration-500">
                    <div class="flex justify-between items-end mb-2 px-1">
                        <div class="flex items-center gap-2">
                            <div class="w-4 h-4 rounded bg-[#F9E013] border border-gray-300"></div>
                            <span class="font-bold text-gray-800 text-lg">RegioJet</span>
                        </div>
                        <div id="text-rj" class="text-right text-lg">0% (0)</div>
                    </div>
                    <!-- Koleje a Vlak -->
                    <div class="relative h-[64px] border-b-[3px] border-gray-400">
                        <div class="sleepers absolute bottom-[-3px] left-0 w-full h-[6px] z-0"></div>
                        
                        <div id="bar-rj" class="train-animate absolute left-0 bottom-[1px] h-[56px] z-10 overflow-hidden" style="width: 0%;">
                            <div class="absolute bottom-0 right-0 w-[2000px] h-[8px] wheels-layer"></div>
                            <div class="absolute left-0 top-0 h-[48px] right-[79px] bg-repeat-x wagon-rj"></div>
                            <div class="absolute right-0 top-0 w-[80px] h-[48px]">
                                <svg width="80" height="48" viewBox="0 0 80 48" xmlns="http://www.w3.org/2000/svg">
                                    <defs><clipPath id="rj-clip"><path d="M0,0 L50,0 C70,0 80,20 80,48 L0,48 Z"/></clipPath></defs>
                                    <g clip-path="url(#rj-clip)">
                                        <rect width="80" height="48" fill="#F9E013"/>
                                        <rect y="12" width="80" height="24" fill="#2d3748"/>
                                        <rect x="45" y="15" width="28" height="14" rx="2" fill="#111827"/>
                                        <rect x="76" y="38" width="6" height="4" fill="#ffffff" opacity="0.8"/>
                                    </g>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Řádek: Leo Express -->
                <div id="row-le" class="relative transition-all duration-500">
                    <div class="flex justify-between items-end mb-2 px-1">
                        <div class="flex items-center gap-2">
                            <div class="w-4 h-4 rounded bg-[#1A1A1A]"></div>
                            <span class="font-bold text-gray-800 text-lg">Leo Express</span>
                        </div>
                        <div id="text-le" class="text-right text-lg">0% (0)</div>
                    </div>
                    <!-- Koleje a Vlak -->
                    <div class="relative h-[64px] border-b-[3px] border-gray-400">
                        <div class="sleepers absolute bottom-[-3px] left-0 w-full h-[6px] z-0"></div>
                        
                        <div id="bar-le" class="train-animate absolute left-0 bottom-[1px] h-[56px] z-10 overflow-hidden" style="width: 0%;">
                            <div class="absolute bottom-0 right-0 w-[2000px] h-[8px] wheels-layer"></div>
                            <div class="absolute left-0 top-0 h-[48px] right-[79px] bg-repeat-x wagon-le"></div>
                            <div class="absolute right-0 top-0 w-[80px] h-[48px]">
                                <svg width="80" height="48" viewBox="0 0 80 48" xmlns="http://www.w3.org/2000/svg">
                                    <defs><clipPath id="le-clip"><path d="M0,0 L50,0 C70,0 80,20 80,48 L0,48 Z"/></clipPath></defs>
                                    <g clip-path="url(#le-clip)">
                                        <rect width="80" height="48" fill="#1A1A1A"/>
                                        <rect y="36" width="80" height="4" fill="#E5A900"/>
                                        <rect x="45" y="10" width="28" height="14" rx="2" fill="#374151"/>
                                        <rect x="76" y="40" width="6" height="4" fill="#ffffff" opacity="0.6"/>
                                    </g>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        function updateGraph() {
            // Aktualizace nadpisu
            const titleText = document.getElementById('input-title').value;
            const displayTitle = document.getElementById('display-title');
            displayTitle.innerText = titleText;
            displayTitle.style.display = titleText.trim() === '' ? 'none' : 'block';

            // Získání hodnot z inputů, zajištění že nebudou menší než 0
            const valCD = Math.max(0, parseInt(document.getElementById('input-cd').value) || 0);
            const valRJ = Math.max(0, parseInt(document.getElementById('input-rj').value) || 0);
            const valLE = Math.max(0, parseInt(document.getElementById('input-le').value) || 0);

            const total = valCD + valRJ + valLE;

            // Funkce pro nastavení šířky grafu a textů pro jednotlivé dopravce
            const setCarrierBar = (id, val, totalValue) => {
                const pct = totalValue > 0 ? (val / totalValue * 100) : 0;
                const bar = document.getElementById(`bar-${id}`);
                const text = document.getElementById(`text-${id}`);

                // Animace šířky 
                bar.style.width = `${pct}%`;
                
                // Pokud je hodnota nulová, vlak zcela zneviditelníme, aby se nezobrazovaly useknuté hrany
                bar.style.opacity = pct === 0 ? '0' : '1';

                // Aktualizace popisku
                text.innerHTML = `<span class="font-bold text-xl">${pct.toFixed(1)} %</span> <span class="text-sm text-gray-500 font-semibold ml-1">(${val})</span>`;
            };

            setCarrierBar('cd', valCD, total);
            setCarrierBar('rj', valRJ, total);
            setCarrierBar('le', valLE, total);

            // Seřazení podle procent (největší hodnoty nahoře)
            const data = [
                { id: 'cd', val: valCD },
                { id: 'rj', val: valRJ },
                { id: 'le', val: valLE }
            ];
            
            // Sestupné řazení
            data.sort((a, b) => b.val - a.val);
            
            // Přiřazení flex vlastnosti "order" na základě pozice po seřazení
            data.forEach((item, index) => {
                document.getElementById(`row-${item.id}`).style.order = index;
            });
        }

        // Funkce pro export grafu do PNG pomocí html2canvas
        function exportToPNG() {
            const exportArea = document.getElementById('export-area');
            const originalOrder = exportArea.style.order;
            
            html2canvas(exportArea, {
                backgroundColor: "#ffffff", // Bílé pozadí
                scale: 2 // Vyšší rozlišení pro lepší kvalitu exportu
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'statistika-dopravcu.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        // Automatické načtení grafu při zapnutí stránky (s mírným zpožděním pro efekt najetí)
        window.onload = () => {
            setTimeout(updateGraph, 150);
        };
    </script>
</body>
</html>
